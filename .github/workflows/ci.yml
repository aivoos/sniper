# Polisi / jaksa / hakim: merge hanya jika hijau
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Diperlukan upload-artifact jika repo memakai *Workflow permissions* → read-only default.
permissions:
  contents: read
  actions: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Format (no diff)
        run: |
          test -z "$(gofmt -l . | tee /dev/stderr)"

      - name: Vet
        run: go vet ./...

      - name: "Test + coverage (race: ubuntu has gcc)"
        run: |
          CGO_ENABLED=1 go test ./internal/... -count=1 -race -coverprofile=coverage.out -covermode=atomic

      # Samakan angka dengan COVERAGE_MIN di Makefile (agregat statement; naikkan bertahap + tes).
      - name: Coverage floor
        env:
          COVERAGE_MIN: "71"
        run: |
          pct=$(go tool cover -func=coverage.out | grep '^total:' | awk '{gsub(/%/,"",$3); print $3}')
          echo "total coverage: ${pct}% (min ${COVERAGE_MIN}%)"
          awk -v p="$pct" -v m="$COVERAGE_MIN" 'BEGIN { exit !(p+0 >= m+0) }' || { echo "::error::coverage below ${COVERAGE_MIN}% — lihat docs/testing-and-release.md"; exit 1; }

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage.out
          path: coverage.out
